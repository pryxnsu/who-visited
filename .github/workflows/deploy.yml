name: Deploy to Production

on:
  push:
    branches: ['main']

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy-to-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /home/ubuntu/who-visited

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "Ensuring database container is up..."
            docker compose up -d database

            set -a
            . ./.env
            set +a

            echo "Waiting for database to accept connections..."
            until docker compose exec -T database pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; do
              sleep 2
            done
            echo "Database is ready!"

            echo "Applying database migrations..."
            docker run --rm \
              --network=connection \
              -e NODE_ENV=production \
              -e DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DATABASE_HOST}/${POSTGRES_DB}" \
              -v "$PWD:/app" \
              -w /app \
              node:22-bookworm \
              bash -lc 'corepack enable && corepack prepare pnpm@10.30.1 --activate && pnpm install --frozen-lockfile && pnpm run db:migrate'

            echo "Building and restarting containers..."
            docker compose up -d --build --remove-orphans --pull always

            echo "Deployment complete"
            docker compose ps
